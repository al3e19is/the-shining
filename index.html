<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All work and no play</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#f2ece0; }
#vignette {
  position:fixed; inset:0; pointer-events:none; z-index:3;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(10,5,0,0.6) 100%);
}
#page {
  position:fixed;
  left:0; width:100%;
  display:flex;
  flex-direction:column;
}
.row {
  font-family:'Courier New',Courier,monospace;
  font-size:clamp(11px, 3.5vw, 15px);
  line-height:1.9;
  letter-spacing:0.03em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:clip;
  padding:0 4vw;
  color:#1a1008;
  flex-shrink:0;
}
.row.dim  { color:#9a8a74; }
.row.dark { color:#0a0804; font-weight:bold; }
</style>
</head>
<body>
<div id="vignette"></div>
<div id="page"></div>
<script>
(function(){
  var BASE    = "All work and no play makes Jack a dull boy";
  var CHAR_MS = 65;

  // compute LH after fonts settle
  var LH = 0;

  function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

  var MUTS = [
    function(s){ var i=rnd(1,s.length-2); return s.slice(0,i)+s[i]+s.slice(i); },
    function(s){ var i=rnd(1,s.length-2); return s.slice(0,i)+s.slice(i+1); },
    function(s){ var i=rnd(1,s.length-2); return s.slice(0,i)+s[i+1]+s[i]+s.slice(i+2); },
    function(s){ return s+'s'; },
    function(s){ return s.slice(0,-1); },
    function(s){ var i=rnd(1,s.length-2); return s.slice(0,i)+' '+s.slice(i); },
    function(s){
      var sp=[];
      for(var k=0;k<s.length;k++) if(s[k]===' ') sp.push(k);
      if(!sp.length) return s;
      var p=sp[rnd(0,sp.length-1)];
      return s.slice(0,p)+s.slice(p+1);
    },
    function(s){ var w=s.split(' '); var i=rnd(0,w.length-1); w.splice(i,0,w[i]); return w.join(' '); },
    function(s){ return s; },
    function(s){ return s; },
    function(s){ return s; },
    function(s){ return s; },
  ];

  function mutate(){
    var s=BASE, n=Math.random()<0.38?0:(Math.random()<0.7?1:2), used={};
    for(var k=0;k<=n;k++){
      var idx; do{ idx=rnd(0,MUTS.length-1); }while(used[idx]); used[idx]=true;
      s=MUTS[idx](s);
    }
    return s;
  }

  function rowCls(){
    var r=Math.random();
    if(r<0.08) return ' dim';
    if(r<0.14) return ' dark';
    return '';
  }

  var page     = document.getElementById('page');
  var VH       = window.innerHeight;
  var history  = [];
  var lastChar = 0;

  // cursor
  var curEl = document.createElement('span');
  curEl.textContent = '█';
  var curOn = true;
  setInterval(function(){ curOn=!curOn; curEl.style.opacity=curOn?'1':'0'; }, 400);

  // typing line
  var typingDiv = document.createElement('div');
  typingDiv.className = 'row' + rowCls();
  var typingTn = document.createTextNode('');
  typingDiv.appendChild(typingTn);
  typingDiv.appendChild(curEl);
  page.appendChild(typingDiv);

  var typingText = mutate();
  var typingPos  = 0;

  function reposition(){
    var pageTop = Math.round(VH / 1.5) - history.length * LH;   // ensure the current line is about 2/3 down the screen, and move the history up as it grows
    page.style.top = pageTop + 'px';
  }

  function pruneHistory(maxRows){
    while(history.length > maxRows){
      var old = history.pop();
      if(old.parentNode) old.parentNode.removeChild(old);
    }
  }

  function start(){
    // measure actual line height from a rendered row
    LH = typingDiv.getBoundingClientRect().height || 28;
    var visLines  = Math.floor(VH / LH);
    var halfLines = Math.floor(visLines);

    // random pre-history
    var pre = rnd(0, halfLines - 1);
    for(var i=0; i<pre; i++){
      var div = document.createElement('div');
      div.className = 'row' + rowCls();
      div.textContent = mutate(); 
      page.insertBefore(div, page.firstChild);
      history.unshift(div);
    }
    pruneHistory(halfLines + 3);
    reposition();

    function tick(ts){
      if(ts - lastChar >= CHAR_MS){
        lastChar = ts;
        if(typingPos < typingText.length){
          typingPos++;
          typingTn.textContent = typingText.slice(0, typingPos);
        } else {
          typingDiv.removeChild(curEl);

          var done = document.createElement('div');
          done.className = typingDiv.className;
          done.textContent = typingText;
          page.insertBefore(done, typingDiv);
          history.unshift(done);
          pruneHistory(halfLines + 2);

          typingText = mutate();
          typingPos  = 0;
          typingTn.textContent = '';
          typingDiv.className = 'row' + rowCls();
          typingDiv.appendChild(curEl);

          reposition();
        }
      }
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }

  // wait one frame so browser renders the div and we can measure it
  requestAnimationFrame(function(){
    requestAnimationFrame(start);
  });

})();
</script>
</body>
</html>
